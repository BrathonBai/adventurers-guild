<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-labelledby="title desc">
  <title id="title">从企业 AI 到企业多 Agent</title>
  <desc id="desc">A restrained business cover showing an enterprise work graph coordinated by multiple agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f1e8"/>
      <stop offset="0.52" stop-color="#eef3f0"/>
      <stop offset="1" stop-color="#e7edf4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#edf4f1" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#24413f" flood-opacity="0.16"/>
    </filter>
    <filter id="lineGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#78908d" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="383" fill="url(#bg)"/>
  <rect width="900" height="383" fill="url(#grid)"/>

